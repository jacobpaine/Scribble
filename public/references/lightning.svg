<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .dotted {
        fill: none;
        stroke: #555;
        stroke-width: 2.5;
        stroke-dasharray: 6 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .guide-dot { fill: #888; }
    </style>
  </defs>
  <rect width="400" height="400" fill="white" />
  <!-- Lightning bolt — closed polygon outline -->
  <polygon class="dotted" points="
    130,56 310,56 218,178 290,178 190,344 190,248 120,248
  " />
  <circle class="guide-dot" cx="130" cy="56" r="3" />
  <circle class="guide-dot" cx="310" cy="56" r="3" />
  <circle class="guide-dot" cx="190" cy="344" r="3" />
</svg>
