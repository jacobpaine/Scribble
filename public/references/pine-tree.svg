<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .dotted {
        fill: none;
        stroke: #555;
        stroke-width: 2.5;
        stroke-dasharray: 6 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .guide-dot { fill: #888; }
    </style>
  </defs>
  <rect width="400" height="400" fill="white" />
  <!-- Pine tree — single continuous outline: 3 tiered canopy + trunk -->
  <polygon class="dotted" points="
    214,370 214,258
    245,265 200,200 224,207
    230,215 200,155 215,162
    214,166 200,100
    186,166 185,162
    200,155 170,215 176,207
    200,200 155,265 186,258
    186,370
  " />
  <circle class="guide-dot" cx="200" cy="100" r="3" />
  <circle class="guide-dot" cx="200" cy="370" r="3" />
</svg>
