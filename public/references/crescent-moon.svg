<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .dotted {
        fill: none;
        stroke: #555;
        stroke-width: 2.5;
        stroke-dasharray: 6 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .guide-dot { fill: #888; }
    </style>
  </defs>
  <rect width="400" height="400" fill="white" />
  <!-- Crescent moon using bezier curves for clean cusps -->
  <!-- Top cusp (200,60) -> outer left curve -> bottom cusp (200,340) -> inner left curve -> back -->
  <path class="dotted" d="
    M 200,60
    C 90,60 40,130 40,200
    C 40,270 90,340 200,340
    C 140,310 110,260 110,200
    C 110,140 140,90 200,60
    Z
  " />
  <!-- Cusp dots -->
  <circle class="guide-dot" cx="200" cy="60" r="3.5" />
  <circle class="guide-dot" cx="200" cy="340" r="3.5" />
  <!-- Widest point dot -->
  <circle class="guide-dot" cx="40" cy="200" r="3" />
</svg>
